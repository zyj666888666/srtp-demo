<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年智能问答助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>老年智能问答助手</h1>
        </header>

        <main class="chat-container">
            <div id="chatHistory" class="chat-history">
                <!-- 聊天记录会在这里动态生成 -->
            </div>

            <div class="input-area">
                <button id="voiceBtn" class="voice-btn">
                    <img src="images/mic.png" alt="语音输入" class="icon">
                    按住说话
                </button>
                <textarea id="userInput" placeholder="输入您的问题..." rows="2"></textarea>
                <button id="sendBtn" class="send-btn">发送</button>
            </div>
        </main>

        <footer class="footer">
            <button id="settingsBtn">
                <img src="images/setting.png" alt="设置" class="icon">
                设置
            </button>
        </footer>
    </div>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>设置</h2>
            <div class="setting-item">
                <label for="fontSize">字体大小：</label>
                <select id="fontSize">
                    <option value="16">标准</option>
                    <option value="20" selected>较大</option>
                    <option value="24">特大</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="contrast">对比度：</label>
                <select id="contrast">
                    <option value="normal" selected>标准</option>
                    <option value="high">高对比度</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>正在思考中...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
